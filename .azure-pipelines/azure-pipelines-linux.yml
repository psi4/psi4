jobs:
# Configure, build, install, and test job
- job: 'linux_build'
  displayName: 'Linux Builds'
  timeoutInMinutes: 120
  variables:
    CTEST_OUTPUT_ON_FAILURE: 1
    MKL_CBWR: AUTO
  strategy:
    maxParallel: 8
    matrix:
      gcc_11:
        CXX_COMPILER: 'g++-11'
        PYTHON_VER: '3.14'
        C_COMPILER: 'gcc-11'
        F_COMPILER: 'gfortran'
        BUILD_TYPE: 'release'
        APT_INSTALL: 'gfortran gcc-11 g++-11'
        vmImage: 'ubuntu-latest'
        PYTEST_MARKER_EXPR: "quick"
        PYTEST_NAME_EXPR: 'not nonsense1'
        ENABLE_EINSUMS: "OFF"
        ENABLE_GAUXC: "OFF"
        ENABLE_OOO: "OFF"
        # older GCC + newer L2 vulnerable to OOM w/unity build
        CMARGS: >-
          -Dpsi4_ENABLE_PRECOMPILE_HEADERS=OFF
          -Dpsi4_CMAKE_UNITY_BUILD=OFF
          -DCMAKE_CXX_FLAGS_RELEASE:STRING='-O2 -DNDEBUG'
          -DCMAKE_VERBOSE_MAKEFILE=ON
        CM_GENERATOR: "Unix Makefiles"
        ADVISOR_ARGS: ""
        ADVISOR_DISABLE_ARGS: "compilers"

      gcc_latest:
        CXX_COMPILER: 'g++'
        PYTHON_VER: '3.14'
        C_COMPILER: 'gcc'
        F_COMPILER: 'gfortran'
        BUILD_TYPE: 'release'
        APT_INSTALL: 'gfortran'
        vmImage: 'ubuntu-latest'
        PYTEST_MARKER_EXPR: '((api and not stdsuite and not (smoke or quick or medlong or long)) or einsums)'
        PYTEST_NAME_EXPR: 'not nonsense1'
        ENABLE_EINSUMS: "ON"
        ENABLE_GAUXC: "ON"
        ENABLE_OOO: "ON"
        CMARGS: >-
          -Dpsi4_ENABLE_PRECOMPILE_HEADERS=ON
          -Dpsi4_libmints_UNITY_BUILD_BATCH_SIZE=5
        CM_GENERATOR: "Ninja"
        ADVISOR_ARGS: ""
        ADVISOR_DISABLE_ARGS: "compilers"

      clang_latest:
        CXX_COMPILER: 'clang++-15'
        PYTHON_VER: '3.11'
        C_COMPILER: 'clang-15'
        F_COMPILER: 'gfortran'
        BUILD_TYPE: 'release'
        APT_INSTALL: 'gfortran clang-15 clang++-15'
        # needed by gauxc 'libomp-15-dev' leads to needing `export KMP_DUPLICATE_LIB_OK=TRUE`
        vmImage: 'ubuntu-22.04'
        PYTEST_MARKER_EXPR: 'cli and not (smoke or quick or medlong or long)'
        PYTEST_NAME_EXPR: 'not nonsense1'
        ENABLE_EINSUMS: "OFF"
        ENABLE_GAUXC: "OFF"
        ENABLE_OOO: "ON"
        CMARGS: >-
          -DOpenMP_C_FLAGS=-fopenmp=libomp
          -DOpenMP_CXX_FLAGS=-fopenmp=libomp
          -DOpenMP_C_LIB_NAMES=omp
          -DOpenMP_CXX_LIB_NAMES=omp
          -DOpenMP_omp_LIBRARY=/usr/share/miniconda/envs/p4env/lib/libomp.so
          -Dpsi4_ENABLE_PRECOMPILE_HEADERS=ON
        CM_GENERATOR: "Ninja"
        ADVISOR_ARGS: ""
        ADVISOR_DISABLE_ARGS: "compilers"

      clang_py314:
        CXX_COMPILER: 'clang++-17'
        PYTHON_VER: '3.14'
        C_COMPILER: 'clang-17'
        F_COMPILER: 'gfortran'
        BUILD_TYPE: 'release'
        APT_INSTALL: 'gfortran clang-17 clang++-17'
        vmImage: 'ubuntu-latest'
        PYTEST_MARKER_EXPR: 'quick'
        PYTEST_NAME_EXPR: 'not nonsense1'
        ENABLE_EINSUMS: "ON"
        ENABLE_GAUXC: "ON"
        ENABLE_OOO: "ON"
        CMARGS: >-
          -DOpenMP_C_FLAGS=-fopenmp=libomp
          -DOpenMP_CXX_FLAGS=-fopenmp=libomp
          -DOpenMP_C_LIB_NAMES=omp
          -DOpenMP_CXX_LIB_NAMES=omp
          -DOpenMP_omp_LIBRARY=/usr/share/miniconda/envs/p4env/lib/libomp.so
        CM_GENERATOR: "Ninja"
        ADVISOR_ARGS: ""
        ADVISOR_DISABLE_ARGS: "compilers"

      icpx_conda:
        CXX_COMPILER: 'icpx'
        PYTHON_VER: '3.10'
        C_COMPILER: 'icx'
        F_COMPILER: 'ifx'
        BUILD_TYPE: 'release'
        APT_INSTALL: ''
        vmImage: 'ubuntu-latest'
        # todo
        PYTEST_MARKER_EXPR: '((api and not stdsuite and not (smoke or quick or medlong or long)) or einsums)'
        PYTEST_NAME_EXPR: 'not nonsense1'
        ENABLE_EINSUMS: "OFF"
        ENABLE_GAUXC: "OFF"
        ENABLE_OOO: "ON"
        CMARGS: >-
          -DENABLE_XHOST=OFF
        CM_GENERATOR: "Ninja"
        ADVISOR_ARGS: "--compiler IntelLLVM"
        ADVISOR_DISABLE_ARGS: ""

  pool:
    vmImage: $(vmImage)

  steps:
  - bash: |
      [[ "${APT_REPOSITORY}" ]] && echo "Add Repo ${APT_REPOSITORY}" && sudo add-apt-repository "${APT_REPOSITORY}"
      sudo apt-get update
      sudo apt-get install ${APT_INSTALL}
    displayName: "Apt-Get Packages"

  - bash: |
      echo "" && echo "Ubuntu"
      lsb_release -a

      echo "" && echo "Uname:"
      uname -a

      echo "" && echo "Free:"
      free -m

      echo "" && echo "df:"
      df -h

      echo "" && echo "Ulimit:"
      ulimit -a

      echo "" && echo "Nprocs:"
      getconf _NPROCESSORS_ONLN

      if [[ "$(Agent.JobName)" != "Linux Builds icpx_conda" ]]; then
        echo "CXX Ver:"
        ${CXX_COMPILER} --version
        ${CXX_COMPILER} -v

        echo "F Ver:"
        ${F_COMPILER} --version

        echo "C Ver:"
        ${C_COMPILER} --version
      fi
    displayName: "Setup Information"

  - bash: |
        echo "##vso[task.prependpath]$CONDA/bin"
        conda config --set always_yes yes
        conda config --set solver libmamba
        conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main
        conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r
    displayName: "Add Conda to PATH"

  - bash: |
      grep OPENORBITALOPTIMIZER psi4/src/read_options.cc
      if [[ "$(Agent.JobName)" == "Linux Builds gcc_latest" ]]; then
        sed -i 's;\(options\.add_str("ORBITAL_OPTIMIZER_PACKAGE", "\)INTERNAL\(", "INTERNAL OOO OPENORBITALOPTIMIZER"\);\1OOO\2;' psi4/src/read_options.cc
      fi
      grep OPENORBITALOPTIMIZER psi4/src/read_options.cc
    displayName: "Special Operation: test OpenOrbitalOptimizer"

  - bash: |
      conda install pyyaml -c conda-forge
      conda/psi4-path-advisor.py \
        env \
        --name p4env \
        --python $PYTHON_VER \
        --disable ${ADVISOR_DISABLE_ARGS} addons docs
      echo "\n<<<  env_p4env.yaml  >>>\n"
      cat env_p4env.yaml
      # test some alternative packages
      if [[ "${PYTHON_VER}" != "3.12" ]]; then
        echo "  - psi4::gcp" >> env_p4env.yaml
        echo "  - psi4::dftd3" >> env_p4env.yaml
      fi
      if [[ "$(Agent.JobName)" == "Linux Builds icpx_conda" ]]; then
        sed -i "s;#- dpcpp;- dpcpp;g" env_p4env.yaml
        sed -i "s;#- ifx;- ifx;g" env_p4env.yaml
      fi
      # sed -i "s;- libint;#- libint;g" env_p4env.yaml
      # sed -i "s;#- psi4::libint;- psi4::libint=2.8.1;g" env_p4env.yaml
      echo "  - einsums>=1.0.6" >> env_p4env.yaml
      echo "  - range-v3" >> env_p4env.yaml
      echo "  - zlib" >> env_p4env.yaml
      echo "  - armadillo" >> env_p4env.yaml
      echo "  - openorbitaloptimizer" >> env_p4env.yaml
      echo "\n<<<  env_p4env.yaml  >>>\n"
      cat env_p4env.yaml
      conda env create -n p4env -f env_p4env.yaml
      source activate p4env
      conda info
      conda list
    displayName: 'Build Environment'

  - bash: |
      source activate p4env
      python -V
      python -c 'import numpy; print(numpy.version.version)'
      conda/psi4-path-advisor.py \
        cmake ${ADVISOR_ARGS} \
        --objdir build \
        --insist
      echo "\n<<<  cache_p4env@build.cmake  >>>\n"
      cat cache_p4env@build.cmake
      cmake \
        -S. \
        -B build \
        -C $(Build.SourcesDirectory)/cache_p4env@build.cmake \
        -G "${CM_GENERATOR}" \
        -D CMAKE_CXX_COMPILER=${CXX_COMPILER} \
        -D CMAKE_C_COMPILER=${C_COMPILER} \
        -D CMAKE_Fortran_COMPILER=${F_COMPILER} \
        -D CMAKE_BUILD_TYPE=${BUILD_TYPE} \
        -D ENABLE_PLUGIN_TESTING=ON \
        -D ENABLE_Einsums="${ENABLE_EINSUMS}" \
        -D ENABLE_IntegratorXX=OFF \
        -D ENABLE_gauxc="${ENABLE_GAUXC}" \
        -D ENABLE_OpenOrbitalOptimizer="${ENABLE_OOO}" \
        -D FORCE_PEDANTIC=ON \
        $(CMARGS) \
        -D CMAKE_INSTALL_PREFIX=$(Agent.BuildDirectory)/Install
    displayName: 'Configure Build'

    # conda remove qcengine --force || true
    # conda remove optking --force || true
    # most lanes are Ninja which parallelizes by default. Makefiles lane (min GCC) needs single thread anyways
  - bash: |
      cd build
      source activate p4env
      cmake --build .
      readelf -d ./stage/lib/psi4/core*.so
      ldd -v ./stage/lib/psi4/core*.so
    displayName: 'Build Psi4'

  - bash: |
      cd build
      source activate p4env
      python -V
      python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
      python -c 'import numpy; print(numpy.version.version)'
      python -c 'import qcelemental as q; print(q.__version__, q.__file__)'
      python -c 'import qcengine as q; print(q.__version__, q.__file__)'
      qcengine info
      ./stage/bin/psi4 ../tests/tu1-h2o-energy/input.dat
    displayName: 'Spot Test'

  - bash: |
      cd build
      source activate p4env
      python -V
      export PYTHONPATH=stage/lib
      export PATH=stage/bin:$PATH
      qcengine info
      python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
      python -c 'import numpy; print(numpy.version.version)'
      python -c 'import qcelemental as q; print(q.__version__, q.__file__)'
      python -c 'import qcengine as q; print(q.__version__, q.__file__)'
      ./stage/bin/psi4 ../tests/ddd-deriv/input.dat
    displayName: 'Spot Test 2'

  - bash: |
      cd build
      source activate p4env
      cmake --build build --target plugin_skeletondfmp2 --verbose
      ls -l tests/plugins/skeletondfmp2/
      ctest -R skeletondfmp2 --output-on-failure || true
      cat Testing/Temporary/L*log
    displayName: "Spot Test 3"

  - bash: |
      cd build
      source activate p4env
      python -V
      ls -l
      pwd
      python -c "import sys;print(sys.path)"
      echo ROUND1
      python -c "import qcelemental as q;print(q.util.which('psi4'))" || true
      psi4 --module || true
      python -c "import qcelemental as q;print(q.util.which_import('psi4'))" || true
      python -c "import psi4; print(psi4.executable)" || true
      echo ROUND1NG
      python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
      echo ROUNDE
      PATH=stage/bin:$PATH python -c "import qcelemental as q;print(q.util.which('psi4'))" || true
      PATH=stage/bin:$PATH psi4 --module || true
      PATH=stage/bin:$PATH python -c "import qcelemental as q;print(q.util.which_import('psi4'))" || true
      PATH=stage/bin:$PATH python -c "import psi4; print(psi4.executable)" || true
      echo ROUNDE-NG
      PATH=stage/bin:$PATH python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
      echo ROUNDP
      PYTHONPATH=stage/lib python -c "import qcelemental as q;print(q.util.which('psi4'))" || true
      PYTHONPATH=stage/lib psi4 --module || true
      PYTHONPATH=stage/lib python -c "import qcelemental as q;print(q.util.which_import('psi4'))" || true
      PYTHONPATH=stage/lib python -c "import psi4; print(psi4.executable)" || true
      echo ROUNDP-NG
      PYTHONPATH=stage/lib python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
      echo ROUND4
      eval $(stage/bin/psi4 --psiapi)
      python -c "import qcelemental as q;print(q.util.which('psi4'))" || true
      psi4 --module || true
      python -c "import qcelemental as q;print(q.util.which_import('psi4'))" || true
      python -c "import psi4; print(psi4.executable)" || true
      echo ROUND4-NG
      python -c "import qcengine as qcng; qcng.get_program('psi4')" || true
    condition: false
    displayName: 'Psi4 Path Setup Diagnostics'
    # when "psi4 not found", use this to figure out what's wrong with QCEngine detection

  - bash: |
      cd build
      source activate p4env
      PATH=stage/bin:$PATH PYTHONPATH=stage/lib/ pytest -k ITERATIVE ../tests/pytests
      cmake --build build --target plugin_skeleton --verbose
      ls -l tests/plugins/skeleton/
      PYTHONPATH=tests/plugins/skeleton ./stage/bin/psi4 ./tests/plugins/skeleton/skeleton/input.dat -o stdout
    displayName: 'Spot Test 4'

  # example with COPY
  #- bash: |
  #    cd build/../tests/fcidump
  #    source activate p4env
  #    ./../../build/stage/bin/psi4 -o stdout
  #  displayName: 'Spot Test 3'

  - bash: |
      cd build
      source activate p4env
      python ../devtools/scripts/ci_run_test.py
      python ../devtools/scripts/ci_print_failing.py
    displayName: 'CTest Tests'

  - bash: |
      cd build
      source activate p4env
      PYTHONPATH=stage/lib/ pytest -v -rws --durations=15 --durations-min=40 --strict-markers --color yes -n 2 -m "$PYTEST_MARKER_EXPR" -k "$PYTEST_NAME_EXPR" stage/lib/psi4/tests/
    displayName: 'PyTest Tests'

# setuptools v66 (vendors packaging v23) incompatible with arb. tarballs. thinks the branch names are versions
